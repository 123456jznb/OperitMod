name: Build Operit Mod

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Disable native builds in all modules
        run: |
          for f in app quickjs llama mnn mmd fbx dragonbones; do
            if [ -f "$f/build.gradle.kts" ]; then
              sed -i '/externalNativeBuild/,/^    }/s/externalNativeBuild/\/\/externalNativeBuild/g' "$f/build.gradle.kts" 2>/dev/null || true
              sed -i '/cmake {/,/^        }/s/^        /        \/\//g' "$f/build.gradle.kts" 2>/dev/null || true
            fi
          done
          echo "Native builds disabled"
          
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OperitMod
          path: app/build/outputs/apk/debug/*.apk

